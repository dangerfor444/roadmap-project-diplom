<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roadmap Platform API Docs</title>
    <link rel="icon" type="image/png" href="/docs/swagger-ui/favicon-32x32.png" />
    <link rel="stylesheet" href="/docs/swagger-ui/swagger-ui.css" />
    <style>
      body {
        margin: 0;
        background: #f3f6fa;
        color: #17212b;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      .docs-header {
        padding: 20px 24px 12px;
        border-bottom: 1px solid #d8e1ea;
        background: #ffffff;
      }

      .docs-header h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      .docs-header p {
        margin: 0;
        max-width: 920px;
        color: #536273;
        line-height: 1.5;
      }

      .docs-links {
        margin-top: 10px;
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      .docs-links a {
        color: #1f5f9b;
        text-decoration: none;
      }

      .docs-links a:hover {
        text-decoration: underline;
      }

      #swagger-ui {
        max-width: 1400px;
        margin: 0 auto;
      }
    </style>
  </head>
  <body>
    <header class="docs-header">
      <h1>Swagger API Documentation</h1>
      <p>
        This page documents our custom platform endpoints: public read/write API,
        manager API, and actor token issuance. Standard Strapi auth endpoints
        like <code>/api/auth/local</code> are not included in this schema.
      </p>
      <div class="docs-links">
        <a href="/docs/openapi.json" target="_blank" rel="noopener">Open raw OpenAPI JSON</a>
        <a href="/app/" target="_blank" rel="noopener">Open public app</a>
        <a href="/admin" target="_blank" rel="noopener">Open Strapi Admin</a>
      </div>
    </header>

    <div id="swagger-ui"></div>

    <script src="/docs/swagger-ui/swagger-ui-bundle.js"></script>
    <script src="/docs/swagger-ui/swagger-ui-standalone-preset.js"></script>
    <script src="/docs/swagger-init.js"></script>
  </body>
</html>
